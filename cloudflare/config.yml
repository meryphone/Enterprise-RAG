# Cloudflare Tunnel — IntecsaRAG beta (frontend only)
# Setup: see README.md in this directory.
# Replace <TUNNEL_ID> and <YOUR_HOSTNAME> after running:
#   cloudflared tunnel create intecsarag-beta

tunnel: <TUNNEL_ID>
credentials-file: /home/maria/.cloudflared/<TUNNEL_ID>.json

ingress:
  - hostname: <YOUR_HOSTNAME>
    service: http://localhost:3000
  - service: http_status:404
