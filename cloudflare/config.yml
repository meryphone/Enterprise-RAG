# Cloudflare Tunnel — IntecsaRAG beta
# Setup: see README.md in this directory.
#
# OPCIÓN A (sin cuenta, sin dominio):
#   cloudflared tunnel --url http://localhost:3000
#   → te da una URL *.trycloudflare.com automáticamente, no hace falta este fichero.
#
# OPCIÓN B (con cuenta Cloudflare + dominio):
#   Rellena TUNNEL_ID y YOUR_HOSTNAME tras ejecutar:
#     cloudflared tunnel create intecsarag-beta

tunnel: <TUNNEL_ID>
credentials-file: /home/maria/.cloudflared/<TUNNEL_ID>.json

ingress:
  - hostname: <YOUR_HOSTNAME>
    service: http://localhost:3000
  - service: http_status:404
